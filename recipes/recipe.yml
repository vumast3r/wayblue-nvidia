# recipes/recipe.yml
name: bazzite-hyprland-nvidia
description: Custom Bazzite stable image with Hyprland and NVIDIA support

base-image: ghcr.io/ublue-os/bazzite-nvidia
image-version: 41

modules:
  - type: dnf
    repos:
      copr:
        - purian23/material-symbols-fonts
    install:
      packages:
        # --- 1. Hyprland Base ---
        - hyprland
        - xdg-desktop-portal-hyprland
        
        # --- 2. Caelestia Shell Runtime Dependencies ---
        - brightnessctl
        - ddcutil
        - network-manager-applet
        - lm_sensors
        - fish
        - qt6-qtdeclarative
        - qt6-qt5compat
        - qt6-qtsvg
        - qt6-qtmultimedia
        
        # --- 3. System Essentials ---
        - nvtop 
        - fastfetch
        - qalculate
        - material-symbols-fonts
        - playerctl 
        - grim
        - slurp
        
        # --- 4. Compilation Tools & Libraries ---
        - cmake
        - ninja-build
        - gcc-c++
        - python3-pip
        - autoconf
        - automake
        - libtool
        - fftw-devel
        - alsa-lib-devel
        - iniparser-devel
        - qt6-qtbase-devel
        - qt6-qtdeclarative-devel
        - qt6-qtwayland-devel
        - qt6-qtsvg-devel
        - qt6-qtshadertools-devel
        - wayland-devel
        - wayland-protocols-devel
        - cli11-devel
        - spirv-tools
        - pkgconf-pkg-config
        - libdrm-devel
        - mesa-libgbm-devel
        - pipewire-devel
        - pulseaudio-libs-devel
        - aubio-devel
        - libxkbcommon-devel
        - pam-devel
        - NetworkManager-libnm-devel
        - lm_sensors-devel
        - libqalculate-devel
        - polkit-devel
        - meson
        - ncurses-devel

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - com.discordapp.Discord
          - com.valvesoftware.Steam
          - org.mozilla.firefox

  # ---------------------------------------------------------
  # PHASE 2: Custom Shell Build
  # ---------------------------------------------------------
  # - type: script
  #   scripts:
  #     - build-caelestia.sh
