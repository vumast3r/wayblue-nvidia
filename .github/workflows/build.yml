name: Build wayblue-nvidia
on:
  schedule:
    - cron: "0 0 * * *" # Build daily to stay updated
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  bluebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Build and Sign Image
        uses: blue-build/github-action@v1.10
        with:
          recipe: recipe.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}

  notify:
    needs: bluebuild
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Discord notification
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ needs.bluebuild.result }}
          title: "Build wayblue-nvidia"
          description: "Fedora 44 build for RTX 5080 and Ryzen 9 9950X3D"
          color: 0x0099ff
          username: "GitHub Actions"
