# recipes/recipe.yml
name: wayblue-nvidia
description: Custom Hyprland image with Caelestia Shell and NVIDIA support

base-image: ghcr.io/wayblueorg/hyprland-nvidia
image-version: 43

modules:
  - type: dnf
    repos:
      copr:
        - purian23/material-symbols-fonts
    install:
      packages:
        # Caelestia Shell Runtime Dependencies
        - brightnessctl
        - ddcutil
        - network-manager-applet
        - lm_sensors
        - fish
        - qt6-qtdeclarative
        - qt6-qt5compat
        - qt6-qtsvg
        - qt6-qtmultimedia
        # System Essentials
        - nvtop 
        - fastfetch
        - qalculate
        - material-symbols-fonts
        - playerctl 
        - grim
        - slurp
        # Compilation Tools & Libraries
        - cmake
        - ninja-build
        - gcc-c++
        - python-pip
        - autoconf
        - automake
        - libtool
        - fftw-devel
        - alsa-lib-devel
        - iniparser-devel
        - qt6-qtbase-devel
        - qt6-qtdeclarative-devel
        - qt6-qtwayland-devel
        - qt6-qtsvg-devel
        - qt6-qtshadertools-devel
        - wayland-devel
        - wayland-protocols-devel
        - cli11-devel
        - spirv-tools
        - pkgconf-pkg-config
        - libdrm-devel
        - mesa-libgbm-devel
# The Final Missing Headers:
        - pipewire-devel
        - pulseaudio-libs-devel
        - aubio-devel
        - libxkbcommon-devel
        - pam-devel
        - NetworkManager-libnm-devel
        - lm_sensors-devel
        - libqalculate-devel
        - polkit-devel
        - meson
        - ncurses-devel

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - com.discordapp.Discord
          - com.valvesoftware.Steam
          - org.mozilla.firefox

  - type: script
    scripts:
      - build-caelestia.sh
