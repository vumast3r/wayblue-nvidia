# recipes/recipe.yml
name: wayblue-nvidia
description: Custom Hyprland image with Caelestia Shell and NVIDIA support

base-image: ghcr.io/wayblueorg/hyprland-nvidia
image-version: 43

modules:
  - type: dnf
    repos:
      copr:
        - errornointernet/quickshell
        - purian23/material-symbols-fonts
    install:
      packages:
        # Caelestia Shell Dependencies
        - brightnessctl
        - ddcutil
        - network-manager-applet
        - lm_sensors
        - fish
        - qt6-qtdeclarative
        - qt6-qt5compat
        - qt6-qtsvg
        - qt6-qtmultimedia
        - qt6-qtwayland-devel # Added for manual quickshell compilation
        - qt6-qtbase-devel # Added for manual quickshell compilation
        # System Essentials
        - nvtop # for NVIDIA drivers
        - fastfetch
        - qalculate
        - material-symbols-fonts
        - playerctl # here
        - grim
        - slurp
        # Compilation Tools
        - cmake
        - ninja-build
        - gcc-c++
        - pipx
        - autoconf
        - automake
        - libtool
        - fftw-devel
        - alsa-lib-devel
        - golang # Added for manual quickshell compilation

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - com.discordapp.Discord
          - com.valvesoftware.Steam
          - org.mozilla.firefox

  - type: script
    scripts:
      - build-caelestia.sh
