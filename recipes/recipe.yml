# recipes/recipe.yml
name: wayblue-nvidia
description: Custom Hyprland image with Caelestia Shell and NVIDIA support

base-image: ghcr.io/wayblueorg/hyprland-nvidia
image-version: 44

modules:
  - type: yum-repos
    repos:
      - https://copr.fedorainfracloud.org/coprs/errornointernet/quickshell/repo/fedora-%OS_VERSION%/errornointernet-quickshell-fedora-%OS_VERSION%.repo
      - https://copr.fedorainfracloud.org/coprs/purian23/material-symbols-fonts/repo/fedora-%OS_VERSION%/purian23-material-symbols-fonts-fedora-%OS_VERSION%.repo

  - type: rpm-ostree
    install:
      # Caelestia Shell Dependencies
      - quickshell
      - brightnessctl
      - ddcutil
      - network-manager-applet
      - libcava
      - lm_sensors
      - fish
      - qt6-qtdeclarative
      - qt6-qt5compat
      - qt6-qtsvg
      - qt6-qtmultimedia
      # System Essentials      
      - nvtop
      - fastfetch
      - qalculate
      - python3-pywal
      - material-symbols-fonts
      # Hard-to-find Caelestia CLI (Required for the video's functionality)
      - playerctl
      - grim
      - slurp

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - com.discordapp.Discord
          - com.valvesoftware.Steam
          - org.mozilla.firefox

  - type: script
    scripts:
      - build-caelestia.sh
