# recipes/recipe.yml
name: wayblue-nvidia
description: Custom Hyprland image with Caelestia Shell and NVIDIA support

base-image: ghcr.io/wayblueorg/hyprland-nvidia
image-version: 43

modules:
  - type: dnf
    repos:
      copr:
        - errornointernet/quickshell
        - purian23/material-symbols-fonts

  - type: rpm-ostree
    install:
      # Caelestia Shell Dependencies
      - quickshell-git
      - brightnessctl
      - ddcutil
      - network-manager-applet
      - lm_sensors
      - fish
      - qt6-qtdeclarative
      - qt6-qt5compat
      - qt6-qtsvg
      - qt6-qtmultimedia
      # System Essentials
      - nvtop
      - fastfetch
      - qalculate
      - material-symbols-fonts
      - playerctl
      - grim
      - slurp
      # Compilation Tools (NEW)
      - cmake
      - ninja-build
      - gcc-c++
      - pipx         # Replaces python3-pywal
      - autoconf     # Needed to build libcava
      - automake     # Needed to build libcava
      - libtool      # Needed to build libcava
      - fftw-devel   # Needed to build libcava
      - alsa-lib-devel # Needed to build libcava

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - com.discordapp.Discord
          - com.valvesoftware.Steam
          - org.mozilla.firefox

  - type: script
    scripts:
      - build-caelestia.sh
